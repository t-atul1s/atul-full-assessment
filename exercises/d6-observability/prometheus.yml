global:
  scrape_interval: 10s

scrape_configs:
  - job_name: balance-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: balance-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

rule_files:
  - alerts.yml
