apiVersion: apps/v1
kind: Deployment
metadata:
  name: balance-api
  labels:
    app: balance-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: balance-api
  template:
    metadata:
      labels:
        app: balance-api
    spec:
      containers:
        - name: api
          image: balance-api:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /balance
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: balance-api
spec:
  selector:
    app: balance-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
