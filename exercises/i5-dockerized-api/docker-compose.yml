services:
  balance-api:
    build:
      context: ..
      dockerfile: i5-dockerized-api/Dockerfile
    ports:
      - "8080:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/balance')"]
      interval: 10s
      timeout: 3s
      retries: 3
